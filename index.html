<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý mét dư vật tư</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; padding: 10px; }
input, select, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    font-size: 16px;
}
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
button.delete { background: red; color: white; }
img { border-radius: 5px; cursor: pointer; }

#imageModal {
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:9999;
}

#fullImage {
max-width:100%;
max-height:100%;
}

#reader { width: 100%; margin-top: 10px; }
</style>
</head>

<body>

<h3>📦 Quản lý mét dư vật tư</h3>

<select id="filterPX" onchange="render()">
<option value="all">-- Chọn phân xưởng --</option>
<option value="may1">May 1</option>
<option value="may2">May 2</option>
<option value="may3">May 3</option>
</select>

<button onclick="startScan()">📷 Quét QR</button>
<button onclick="stopScan()">❌ Tắt quét</button>

<div id="scanStatus" style="text-align:center; font-weight:bold;"></div>

<div id="reader"></div>

<input id="barcode" placeholder="Mã Barcode">
<input id="mavattu" placeholder="Mã vật tư">
<input id="metdu" type="number" placeholder="Số mét dư">

<input type="file" accept="image/*" onchange="loadImage(event)">
<img id="preview" width="100%">
<button onclick="removeImage()">🗑️ Xoá ảnh</button>

<button onclick="addData()">➕ Lưu dữ liệu</button>

<hr>

<input id="search" placeholder="🔍 Tìm kiếm" onkeyup="render()">

<table>
<thead>
<tr>
<th>Barcode</th>
<th>Mã vật tư</th>
<th>PX</th>
<th>Mét dư</th>
<th>Ảnh</th>
<th>Xoá</th>
</tr>
</thead>
<tbody id="dataTable"></tbody>
</table>

<input type="file" id="hiddenFile" accept="image/*" style="display:none;">

<div id="imageModal">
<img id="fullImage">
</div>

<script>
let data = JSON.parse(localStorage.getItem("metdu")) || [];
let html5Qr;
let currentImage = "";
let currentEditIndex = null;

// SAVE
function saveData() {
    localStorage.setItem("metdu", JSON.stringify(data));
}

// RENDER
function render() {
    const table = document.getElementById("dataTable");
    const px = document.getElementById("filterPX").value;
    const key = document.getElementById("search").value.toLowerCase();

    table.innerHTML = "";

    data.forEach((item, index) => {

        const matchSearch = !key ||
            (item.barcode || "").toLowerCase().includes(key) ||
            (item.mavattu || "").toLowerCase().includes(key);

        const matchPX = px === "all" || item.phanxuong === px;

        if (!matchSearch || !matchPX) return;

        table.innerHTML += `
        <tr>
            <td onclick="viewImageByIndex(${index})">${item.barcode}</td>
            <td>${item.mavattu}</td>
            <td>${item.phanxuong}</td>
            <td>
                <input type="number" value="${item.metdu}" 
                onchange="updateMet(${index}, this.value)">
            </td>
            <td>
                ${
                    item.image && item.image !== "null"
                    ? `<img src="${item.image}" width="50" onclick="event.stopPropagation(); changeImage(${index})">`
                    : `<button onclick="changeImage(${index})">📷 Thêm ảnh</button>`
                }
                <br>
                <button onclick="deleteImage(${index})">🗑️</button>
            </td>
            <td><button class="delete" onclick="removeData(${index})">X</button></td>
        </tr>`;
    });
}

// ADD
function addData() {
    const barcode = document.getElementById("barcode");
    const mavattu = document.getElementById("mavattu");
    const metdu = document.getElementById("metdu");
    const px = document.getElementById("filterPX").value;

    if (!barcode.value && !mavattu.value) return alert("Nhập Barcode hoặc Mã vật tư!");
    if (px === "all") return alert("Chọn phân xưởng!");

    data.push({
        barcode: barcode.value,
        mavattu: mavattu.value,
        metdu: metdu.value,
        phanxuong: px,
        image: currentImage || null
    });

    saveData();
    render();

    barcode.value = "";
    mavattu.value = "";
    metdu.value = "";
    preview.src = "";
    currentImage = "";
}

// UPDATE
function updateMet(index, value) {
    data[index].metdu = value;
    saveData();
}

// DELETE ROW
function removeData(index) {
    if (confirm("Bạn có chắc muốn xoá dòng này không?")) {
        data.splice(index, 1);
        saveData();
        render();
    }
}

// DELETE IMAGE
function deleteImage(index) {
    if (!confirm("Bạn có chắc muốn xoá ảnh không?")) return;

    data[index].image = null;
    saveData();
    render();
}

// LOAD IMAGE
function loadImage(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = ev => {
        currentImage = ev.target.result;
        preview.src = currentImage;
    };
    reader.readAsDataURL(file);

    e.target.value = "";
}

// CHANGE IMAGE
function changeImage(index) {
    currentEditIndex = index;
    hiddenFile.click();
}

hiddenFile.addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = ev => {
        data[currentEditIndex].image = ev.target.result;
        saveData();
        render();
    };
    reader.readAsDataURL(file);
});

// VIEW IMAGE
function viewImageByIndex(index) {
    const img = data[index].image;
    if (!img) return alert("Không có ảnh");

    const modal = document.getElementById("imageModal");
    const full = document.getElementById("fullImage");

    modal.style.display = "flex";

    setTimeout(() => {
        full.src = img;
    }, 50);
}

// CLOSE MODAL
document.getElementById("imageModal").addEventListener("click", function(e) {
    if (e.target.id === "imageModal") {
        this.style.display = "none";
    }
});

// 🔥 QR FIX iPHONE
function startScan() {
    if (!html5Qr) html5Qr = new Html5Qrcode("reader");

    document.getElementById("scanStatus").innerText = "📷 Đang mở camera...";

    Html5Qrcode.getCameras().then(devices => {

        if (devices && devices.length) {

            const cameraId = devices.length > 1 ? devices[1].id : devices[0].id;

            html5Qr.start(
                cameraId,
                { fps: 10, qrbox: 250 },
                (text) => {
                    document.getElementById("barcode").value = text;
                    document.getElementById("scanStatus").innerText = "✅ Quét xong";
                    stopScan();
                }
            );

        } else {
            document.getElementById("scanStatus").innerText = "❌ Không tìm thấy camera";
        }

    }).catch(err => {
        document.getElementById("scanStatus").innerText = "❌ Lỗi camera: " + err;
    });
}

function stopScan() {
    if (html5Qr && html5Qr.isScanning) {
        html5Qr.stop().then(() => {
            document.getElementById("reader").innerHTML = "";
            document.getElementById("scanStatus").innerText = "⛔ Đã tắt quét QR";
        }).catch(() => {});
    }
}

// ⚠️ CẢNH BÁO iPHONE
window.onload = function() {
    if (location.protocol !== "https:" && location.hostname !== "localhost") {
        alert("⚠️ iPhone cần mở bằng HTTPS mới dùng được camera");
    }
}

render();
</script>

</body>
</html>
