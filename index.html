<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý mét dư</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      box-sizing: border-box;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: center;
    }

    .done {
      background: red;
      color: white;
    }

    h3 {
      margin-bottom: 10px;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h3>📦 Quản lý mét dư (Firebase)</h3>

  <select id="px">
    <option value="">-- Chọn phân xưởng --</option>
    <option value="may1">May 1</option>
    <option value="may2">May 2</option>
    <option value="may3">May 3</option>
    <option value="inep">In ép</option>
  </select>

  <input id="barcode" placeholder="Barcode">

  <input id="mavattu" list="listMavattu" placeholder="Mã vật tư">
  <datalist id="listMavattu"></datalist>

  <input id="metdu" type="number" placeholder="Mét dư">

  <button onclick="addData()">➕ Lưu</button>

  <input id="search" placeholder="🔍 Tìm theo mã vật tư hoặc barcode">

  <hr>

  <table>
    <thead>
      <tr>
        <th>Barcode</th>
        <th>Mã</th>
        <th>PX</th>
        <th>Mét</th>
        <th>Ngày</th>
        <th>Xuất</th>
        <th>Xoá</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      deleteDoc,
      doc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC-yrm3K3rmaRJgJeYEsgGXzpwZYetnR9Q",
      authDomain: "khodulieu-68b4e.firebaseapp.com",
      projectId: "khodulieu-68b4e",
      storageBucket: "khodulieu-68b4e.firebasestorage.app",
      messagingSenderId: "788765202899",
      appId: "1:788765202899:web:505f03caa36bcc2d71f726"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let data = [];
    let danhSachMa = [];

    const pxInput = document.getElementById("px");
    const barcodeInput = document.getElementById("barcode");
    const mavattuInput = document.getElementById("mavattu");
    const metduInput = document.getElementById("metdu");
    const searchInput = document.getElementById("search");

    window.addData = async function () {
      const barcode = barcodeInput.value.trim();
      const mavattu = mavattuInput.value.trim();
      const metdu = metduInput.value.trim();
      const px = pxInput.value;

      if (!px) {
        alert("Vui lòng chọn phân xưởng");
        pxInput.focus();
        return;
      }

      if (!barcode && !mavattu) {
        alert("Nhập dữ liệu");
        return;
      }

      try {
        await addDoc(collection(db, "metdu"), {
          barcode: barcode,
          mavattu: mavattu,
          metdu: Number(metdu) || 0,
          phanxuong: px,
          done: false,
          time: new Date().toISOString(),
          ngay: new Date().toLocaleDateString("vi-VN")
        });

        barcodeInput.value = "";
        mavattuInput.value = "";
        metduInput.value = "";
      } catch (error) {
        console.error("Lỗi khi lưu:", error);
        alert("Lưu dữ liệu thất bại");
      }
    };

    function updateDatalist() {
      const list = document.getElementById("listMavattu");
      list.innerHTML = "";

      let dataTheoPX = data;
      const pxDangChon = pxInput.value;

      if (pxDangChon) {
        dataTheoPX = data.filter(i => i.phanxuong === pxDangChon);
      }

      danhSachMa = [...new Set(
        dataTheoPX
          .map(i => (i.mavattu || "").trim())
          .filter(Boolean)
      )];

      danhSachMa.forEach(ma => {
        list.innerHTML += `<option value="${ma}">`;
      });
    }

    function render() {
      const table = document.getElementById("table");
      table.innerHTML = "";

      const pxDangChon = pxInput.value.trim().toLowerCase();
      const tuKhoa = searchInput.value.trim().toLowerCase();

      let filteredData = [...data];

      if (pxDangChon) {
        filteredData = filteredData.filter(item =>
          (item.phanxuong || "").toLowerCase() === pxDangChon
        );
      }

      if (tuKhoa) {
        filteredData = filteredData.filter(item =>
          (item.mavattu || "").toLowerCase().includes(tuKhoa) ||
          (item.barcode || "").toLowerCase().includes(tuKhoa)
        );
      }

      filteredData.forEach((item) => {
        const realIndex = data.findIndex(d => d.id === item.id);

        table.innerHTML += `
          <tr class="${item.done ? 'done' : ''}">
            <td>${item.barcode || ""}</td>
            <td>${item.mavattu || ""}</td>
            <td>${item.phanxuong || ""}</td>
            <td>${item.metdu || ""}</td>
            <td>${item.ngay || ""}</td>
            <td>
              <button onclick="toggle(${realIndex})">
                ${item.done ? "✅" : "📦"}
              </button>
            </td>
            <td>
              <button onclick="del(${realIndex})">X</button>
            </td>
          </tr>
        `;
      });
    }

    window.toggle = async function (i) {
      const item = data[i];
      await updateDoc(doc(db, "metdu", item.id), {
        done: !item.done
      });
    };

    window.del = async function (i) {
      if (!confirm("Xoá?")) return;
      const item = data[i];
      await deleteDoc(doc(db, "metdu", item.id));
    };

    pxInput.addEventListener("change", () => {
      updateDatalist();
      render();
    });

    searchInput.addEventListener("input", () => {
      render();
    });

    onSnapshot(collection(db, "metdu"), (snap) => {
      data = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      data.sort((a, b) => new Date(b.time) - new Date(a.time));

      updateDatalist();
      render();
    });
  </script>

</body>
</html>
