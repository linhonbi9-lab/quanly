<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý mét dư</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; padding: 10px; }
input, select, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}
table { width: 100%; border-collapse: collapse; }
th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
.done { background: red; color: white; }
</style>
</head>

<body>

<h3>📦 Quản lý mét dư (Firebase)</h3>

<select id="px">
<option value="">-- Chọn phân xưởng --</option>
<option value="may1">May 1</option>
<option value="may2">May 2</option>
<option value="may3">May 3</option>
</select>

<input id="barcode" placeholder="Barcode">
<input id="mavattu" placeholder="Mã vật tư">
<input id="metdu" type="number" placeholder="Mét dư">

<button onclick="addData()">➕ Lưu</button>

<hr>

<table>
<thead>
<tr>
<th>Barcode</th>
<th>Mã</th>
<th>PX</th>
<th>Mét</th>
<th>Xuất</th>
<th>Xoá</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC-yrm3K3rmaRJgJeYEsgGXzpwZYetnR9Q",
  authDomain: "khodulieu-68b4e.firebaseapp.com",
  projectId: "khodulieu-68b4e",
  storageBucket: "khodulieu-68b4e.firebasestorage.app",
  messagingSenderId: "788765202899",
  appId: "1:788765202899:web:505f03caa36bcc2d71f726"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = [];

window.addData = async function() {
  const barcode = document.getElementById("barcode").value;
  const mavattu = document.getElementById("mavattu").value;
  const metdu = document.getElementById("metdu").value;
  const px = document.getElementById("px").value;

  if (!barcode && !mavattu) return alert("Nhập dữ liệu");

  await addDoc(collection(db, "metdu"), {
    barcode,
    mavattu,
    metdu,
    phanxuong: px,
    done: false,
    time: new Date().toISOString()
  });

  barcode.value = "";
  mavattu.value = "";
  metdu.value = "";
};

function render() {
  const table = document.getElementById("table");
  table.innerHTML = "";

  data.forEach((item, index) => {
    table.innerHTML += `
    <tr class="${item.done ? 'done' : ''}">
      <td>${item.barcode || ""}</td>
      <td>${item.mavattu || ""}</td>
      <td>${item.phanxuong || ""}</td>
      <td>${item.metdu || ""}</td>
      <td>
        <button onclick="toggle(${index})">
          ${item.done ? "✅" : "📦"}
        </button>
      </td>
      <td>
        <button onclick="del(${index})">X</button>
      </td>
    </tr>
    `;
  });
}

window.toggle = async function(i) {
  const item = data[i];
  await updateDoc(doc(db, "metdu", item.id), {
    done: !item.done
  });
};

window.del = async function(i) {
  if (!confirm("Xoá?")) return;
  const item = data[i];
  await deleteDoc(doc(db, "metdu", item.id));
};

onSnapshot(collection(db, "metdu"), (snap) => {
  data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
});
</script>

</body>
</html>
