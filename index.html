<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý mét dư vật tư</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; padding: 10px; }
input, select, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    font-size: 16px;
}
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
button.delete { background: red; color: white; }
img { border-radius: 5px; cursor: pointer; }
#reader { width: 100%; margin-top: 10px; }
</style>
</head>

<body>

<h3>📦 Quản lý mét dư vật tư</h3>

<select id="filterPX" onchange="render()">
<option value="all">-- Chọn phân xưởng --</option>
<option value="may1">May 1</option>
<option value="may2">May 2</option>
<option value="may3">May 3</option>
</select>

<button onclick="startScan()">📷 Quét QR</button>
<div id="reader"></div>

<input id="barcode" placeholder="Mã Barcode">
<input id="mavattu" placeholder="Mã vật tư">
<input id="metdu" type="number" placeholder="Số mét dư">

<input type="file" accept="image/*" onchange="loadImage(event)">

<img id="preview" width="100%">
<button onclick="removeImage()">🗑️ Xoá ảnh (trước khi lưu)</button>

<button onclick="addData()">➕ Lưu dữ liệu</button>

<hr>

<input id="search" placeholder="🔍 Tìm kiếm" onkeyup="render()">

<table>
<thead>
<tr>
<th>Barcode</th>
<th>Mã vật tư</th>
<th>PX</th>
<th>Mét dư</th>
<th>Ảnh</th>
<th>Xoá</th>
</tr>
</thead>
<tbody id="dataTable"></tbody>
</table>

<!-- input ẩn để đổi ảnh -->
<input type="file" id="hiddenFile" accept="image/*" style="display:none;">

<!-- XEM ẢNH -->
<div id="imageModal" style="
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:9999;
">
<img id="fullImage" style="max-width:95%; max-height:95%;">
<button onclick="closeImage()" style="
position:absolute;
top:20px;
right:20px;
padding:10px;
background:red;
color:white;
border:none;
">X</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("metdu")) || [];
let html5Qr;
let currentImage = "";
let currentEditIndex = null;

// SAVE
function saveData() {
    localStorage.setItem("metdu", JSON.stringify(data));
}

// RENDER
function render() {
    const table = document.getElementById("dataTable");
    const px = document.getElementById("filterPX").value;
    const key = document.getElementById("search").value.toLowerCase();

    table.innerHTML = "";

    data.forEach((item, index) => {

        const matchSearch = !key ||
            (item.barcode || "").toLowerCase().includes(key) ||
            (item.mavattu || "").toLowerCase().includes(key);

        const matchPX = px === "all" || item.phanxuong === px;

        if (!matchSearch || !matchPX) return;

        table.innerHTML += `
        <tr>
            <!-- click barcode xem ảnh -->
            <td onclick="viewImage('${item.image}')">
                ${item.barcode}
            </td>

            <td>${item.mavattu}</td>
            <td>${item.phanxuong}</td>

            <td>
                <input type="number" value="${item.metdu}" 
                onchange="updateMet(${index}, this.value)">
            </td>

            <td>
                ${
                    item.image 
                    ? `<img src="${item.image}" width="50" onclick="changeImage(${index})">`
                    : `<button onclick="changeImage(${index})">📷 Thêm ảnh</button>`
                }
                <br>
                <button onclick="deleteImage(${index})">🗑️ Xoá</button>
            </td>

            <td><button class="delete" onclick="removeData(${index})">X</button></td>
        </tr>`;
    });
}

// ADD
function addData() {
    const barcodeEl = document.getElementById("barcode");
    const mavattuEl = document.getElementById("mavattu");
    const metduEl = document.getElementById("metdu");

    const barcode = barcodeEl.value.trim();
    const mavattu = mavattuEl.value.trim();
    const metdu = metduEl.value;
    const px = document.getElementById("filterPX").value;

    if (!barcode && !mavattu) return alert("Nhập Barcode hoặc Mã vật tư!");
    if (px === "all") return alert("Chọn phân xưởng!");

    data.push({
        barcode,
        mavattu,
        metdu,
        phanxuong: px,
        image: currentImage,
        date: new Date().toLocaleString()
    });

    saveData();
    render();

    barcodeEl.value = "";
    mavattuEl.value = "";
    metduEl.value = "";
    document.getElementById("preview").src = "";
    currentImage = "";
}

// UPDATE
function updateMet(index, value) {
    data[index].metdu = value;
    saveData();
}

// DELETE
function removeData(index) {
    if (confirm("Xoá dữ liệu này?")) {
        data.splice(index, 1);
        saveData();
        render();
    }
}

// LOAD ẢNH KHI THÊM MỚI
function loadImage(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(ev) {
        currentImage = ev.target.result;
        document.getElementById("preview").src = currentImage;
    };

    reader.readAsDataURL(file);
}

// ĐỔI ẢNH TRONG BẢNG
function changeImage(index) {
    currentEditIndex = index;
    document.getElementById("hiddenFile").click();
}

document.getElementById("hiddenFile").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(ev) {
        data[currentEditIndex].image = ev.target.result;
        saveData();
        render();
    };

    reader.readAsDataURL(file);
});

// XOÁ ẢNH
function deleteImage(index) {
    if (confirm("Xoá ảnh này?")) {
        data[index].image = "";
        saveData();
        render();
    }
}

// XOÁ ẢNH TRƯỚC KHI LƯU
function removeImage() {
    currentImage = "";
    document.getElementById("preview").src = "";
}

// VIEW
function viewImage(src) {
    if (!src) return alert("Không có ảnh");
    imageModal.style.display = "flex";
    fullImage.src = src;
}

function closeImage() {
    imageModal.style.display = "none";
}

// QR
function startScan() {
    if (!html5Qr) html5Qr = new Html5Qrcode("reader");

    html5Qr.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (text) => {
            document.getElementById("barcode").value = text;
            html5Qr.stop();
            document.getElementById("reader").innerHTML = "";
        }
    );
}

render();
</script>

</body>
</html>
