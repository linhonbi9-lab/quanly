<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý mét dư vật tư</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<link href="https://unpkg.com/cropperjs/dist/cropper.min.css" rel="stylesheet"/>
<script src="https://unpkg.com/cropperjs"></script>

<style>
body { font-family: Arial; padding: 10px; }
input, select, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    font-size: 16px;
}
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
button.delete { background: red; color: white; }
img { border-radius: 5px; cursor: pointer; }
</style>
</head>

<body>

<h3>📦 Quản lý mét dư vật tư</h3>

<select id="filterPX" onchange="render()">
<option value="all">-- Chọn phân xưởng --</option>
<option value="may1">May 1</option>
<option value="may2">May 2</option>
<option value="may3">May 3</option>
</select>

<button onclick="startScan()">📷 Quét QR</button>
<button onclick="stopScan()">🛑 Tắt camera</button>
<div id="reader"></div>

<input id="barcode" placeholder="Mã Barcode">
<input id="mavattu" placeholder="Mã vật tư">
<input id="metdu" type="number" placeholder="Số mét dư">

<input type="file" accept="image/*" onchange="loadImage(event)">
<img id="preview" width="100%">

<div id="editor" style="display:none;">
    <img id="editImage" style="max-width:100%;">
    <button onclick="cropImage()">✂️ Cắt</button>
    <button onclick="rotateImage()">🔄 Xoay</button>
    <button onclick="saveEdit()">💾 Lưu ảnh</button>
</div>

<button onclick="addData()">➕ Lưu dữ liệu</button>

<hr>

<input id="search" placeholder="🔍 Tìm kiếm" onkeyup="render()">

<table>
<thead>
<tr>
<th>Barcode</th>
<th>Mã vật tư</th>
<th>PX</th>
<th>Mét dư</th>
<th>Ảnh</th>
<th>Xoá</th>
</tr>
</thead>
<tbody id="dataTable"></tbody>
</table>

<!-- Xem ảnh -->
<div id="imageModal" style="
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:9999;
">
<img id="fullImage" style="max-width:95%; max-height:95%;">
<button onclick="closeImage()" style="
position:absolute;
top:20px;
right:20px;
padding:10px;
background:red;
color:white;
border:none;
">X</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("metdu")) || [];
let html5Qr;
let currentImage = "";
let cropper;
let editingIndex = null;

function saveData() {
    localStorage.setItem("metdu", JSON.stringify(data));
}

function render() {
    const table = document.getElementById("dataTable");
    const px = document.getElementById("filterPX").value;
    const key = document.getElementById("search").value.toLowerCase();

    table.innerHTML = "";

    data.filter(item => {
        if (key) {
            return (item.barcode || "").toLowerCase().includes(key) ||
                   (item.mavattu || "").toLowerCase().includes(key);
        }
        return px === "all" || item.phanxuong === px;
    }).forEach((item, index) => {

        table.innerHTML += `
        <tr>
            <td>${item.barcode}</td>
            <td>${item.mavattu}</td>
            <td>${item.phanxuong}</td>

            <td>
                <input type="number" value="${item.metdu}" 
                onchange="updateMet(${index}, this.value)">
            </td>

            <td>
                ${
                    Array.isArray(item.image)
                    ? item.image.map(img => 
                        `<img src="${img}" width="50" style="margin:2px" onclick="viewImage('${img}')">`
                      ).join("")
                    : item.image
                    ? `<img src="${item.image}" width="50" onclick="viewImage('${item.image}')">`
                    : ""
                }
                <br>
                <button onclick="editImage(${index})">🖼️ Sửa</button>
            </td>

            <td><button class="delete" onclick="removeData(${index})">X</button></td>
        </tr>`;
    });
}

function addData() {
    const barcode = document.getElementById("barcode").value.trim();
    const mavattu = document.getElementById("mavattu").value.trim();
    const metdu = document.getElementById("metdu").value;
    const px = document.getElementById("filterPX").value;

    if (!barcode && !mavattu) return alert("Nhập Barcode hoặc Mã vật tư!");
    if (px === "all") return alert("Chọn phân xưởng!");

    data.push({ barcode, mavattu, metdu, phanxuong: px, image: currentImage });

    saveData();
    render();

    document.getElementById("barcode").value = "";
    document.getElementById("mavattu").value = "";
    document.getElementById("metdu").value = "";
    document.getElementById("preview").src = "";
    currentImage = "";
}

function updateMet(index, value) {
    data[index].metdu = value;
    saveData();
}

function removeData(index) {
    if (confirm("Xoá dữ liệu này?")) {
        data.splice(index, 1);
        saveData();
        render();
    }
}

function editImage(index) {
    editingIndex = index;
    alert("Chọn ảnh mới để sửa");
}

function startScan() {
    if (!html5Qr) html5Qr = new Html5Qrcode("reader");

    html5Qr.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (text) => {
            document.getElementById("barcode").value = text;
            stopScan();
        }
    );
}

function stopScan() {
    if (html5Qr) {
        html5Qr.stop().then(() => {
            document.getElementById("reader").innerHTML = "";
        }).catch(err => console.log(err));
    }
}

function loadImage(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(ev) {
        openEditor(ev.target.result);
    };

    reader.readAsDataURL(file);
}

function openEditor(src) {
    document.getElementById("editor").style.display = "block";
    document.getElementById("editImage").src = src;

    if (cropper) cropper.destroy();
    cropper = new Cropper(document.getElementById("editImage"), { viewMode: 1 });
}

function cropImage() {
    const canvas = cropper.getCroppedCanvas();
    document.getElementById("editImage").src = canvas.toDataURL();
}

function rotateImage() {
    cropper.rotate(90);
}

function saveEdit() {
    const canvas = cropper.getCroppedCanvas();
    const img = canvas.toDataURL("image/png");

    if (editingIndex !== null) {

        if (data[editingIndex].image) {
            if (!Array.isArray(data[editingIndex].image)) {
                data[editingIndex].image = [data[editingIndex].image];
            }
            data[editingIndex].image.push(img);
        } else {
            data[editingIndex].image = img;
        }

        editingIndex = null;
        saveData();
        render();

    } else {
        currentImage = img;
        document.getElementById("preview").src = currentImage;
    }

    document.getElementById("editor").style.display = "none";
}

function viewImage(src) {
    document.getElementById("imageModal").style.display = "flex";
    document.getElementById("fullImage").src = src;
}

function closeImage() {
    document.getElementById("imageModal").style.display = "none";
}

render();
</script>

</body>
</html>
